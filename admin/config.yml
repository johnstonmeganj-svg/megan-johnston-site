# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: johnstonmeganj-svg/megan-johnston-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/af6174ad-45ab-4dd5-b46a-fccb6c15c11e/pkce
  auth_token_endpoint: /sites/af6174ad-45ab-4dd5-b46a-fccb6c15c11e/token
  gateway_url: https://gateway.decapbridge.com
  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://meganjjohnston.com

# Where uploaded images land, and the URL path the site uses to serve them.
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "notes"
    label: "Notes"
    label_singular: "Post"
    folder: "src/notes"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post.njk" }
      - { label: "Permalink", name: "permalink", widget: "hidden", default: "", pattern: ['.*', 'auto-filled on save'] }
      - { label: "Title (also the page heading)", name: "title", widget: "string", hint: "Shows as both the headline on the page and the browser tab title." }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional photo shown at the top of the post." }
      - { label: "Photo description (for screen readers & SEO)", name: "photoAlt", widget: "string", required: false }
      - { label: "Meta description (for Google & social previews)", name: "description", widget: "text" }
      - { label: "Card excerpt (shown on the Notes listing page)", name: "excerpt", widget: "text" }
      - { label: "Category label", name: "category", widget: "string", hint: 'e.g. "July 2026 · Commercial"' }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: "Advanced (optional)"
        name: "advanced"
        widget: "object"
        collapsed: true
        required: false
        fields:
          - { label: "Override on-page heading", name: "heading", widget: "string", required: false, hint: "Only if the H1 should read differently than the title above." }
          - { label: "Override share-preview title", name: "ogTitle", widget: "string", required: false }
          - { label: "Override share-preview description", name: "ogDescription", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "credits"
    label: "Work Credits"
    files:
      - name: "credits"
        label: "Narrative & Commercial Credits"
        file: "src/_data/credits.json"
        fields:
          - label: "Narrative"
            name: "narrative"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Role", name: "role", widget: "string", hint: 'Your role only, e.g. "Utility Set Production Assistant"' }
              - { label: "Staff", name: "staff", widget: "string", required: false, hint: 'Other crew on the job, separated by " | ", e.g. "1st AD Kether Abeles | Key 2nd Alex Salazar | 2nd 2nd Ben Gregory". Leave blank if none.' }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional small photo shown next to this credit." }
              - { label: "Photo description", name: "photoAlt", widget: "string", required: false }
          - label: "Commercial"
            name: "commercial"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Role", name: "role", widget: "string", hint: 'Your role only, e.g. "Set Production Assistant"' }
              - { label: "Staff", name: "staff", widget: "string", required: false, hint: 'Other crew on the job, separated by " | ". Leave blank if none.' }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional small photo shown next to this credit." }
              - { label: "Photo description", name: "photoAlt", widget: "string", required: false }

  - name: "home"
    label: "Home Page"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/_data/home.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "First name", name: "heroFirstName", widget: "string" }
              - { label: "Last name", name: "heroLastName", widget: "string" }
              - { label: "Tagline", name: "heroTagline", widget: "string", hint: 'e.g. "Freelance Producer & Assistant Director"' }
          - { label: "Scrolling ticker phrases", name: "tickerPhrases", widget: "list", field: { label: "Phrase", name: "phrase", widget: "string" }, hint: "Short phrases that scroll under the hero. Keep to a couple of words each." }
          - label: "Selected work (3 highlight cards)"
            name: "selectedWork"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Tag", name: "tag", widget: "select", options: ["Narrative", "Commercial"] }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
          - { label: "Notes section heading", name: "notesHeading", widget: "string" }
          - label: "Bottom call to action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "ctaHeading", widget: "string" }
              - { label: "Body", name: "ctaBody", widget: "text" }
              - { label: "Button text", name: "ctaButton", widget: "string" }

  - name: "about"
    label: "About Page"
    files:
      - name: "about"
        label: "About Page"
        file: "src/_data/about.json"
        fields:
          - { label: "Lede (top of page)", name: "lede", widget: "text" }
          - { label: "Portrait photo", name: "portrait", widget: "image", required: false, hint: "Optional. Leave blank to hide." }
          - { label: "Portrait description", name: "portraitAlt", widget: "string", required: false }
          - { label: '"How I show up" heading', name: "cardsHeading", widget: "string" }
          - label: "Cards"
            name: "cards"
            widget: "list"
            summary: "{{text}}"
            fields:
              - { label: "Text", name: "text", widget: "string" }
              - { label: "Color", name: "color", widget: "select", options: ["yellow", "red", "blue"] }
          - label: "Bottom call to action"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "ctaHeading", widget: "string" }
              - { label: "Body", name: "ctaBody", widget: "text" }
              - { label: "Button text", name: "ctaButton", widget: "string" }

  - name: "contact"
    label: "Contact Page"
    files:
      - name: "contact"
        label: "Contact Page"
        file: "src/_data/contact.json"
        fields:
          - { label: "Email address", name: "email", widget: "string" }
          - { label: "Socials block heading", name: "socialHeading", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Site Settings"
        file: "src/_data/site.json"
        fields:
          - { label: "Site URL", name: "url", widget: "string", hint: "No trailing slash, e.g. https://meganjjohnston.com" }
          - { label: "Your name", name: "name", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "IMDb URL", name: "imdb", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
